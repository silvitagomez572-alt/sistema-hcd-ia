version: "3.9"

services:
  api:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./api:/app/api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./frontend:/app/frontend
      - ./requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install streamlit requests pandas -q &&
               streamlit run frontend/app.py --server.port 8502"
    ports:
      - "8502:8502"
    depends_on:
      - api

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
